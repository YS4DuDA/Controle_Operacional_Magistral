<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magistral - Registro</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #0f264a; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card p-4 p-sm-5 shadow-lg text-center m-3" style="max-width: 450px; width: 100%; border-top: 8px solid #e31e24; border-radius: 0;">
        <img src="{{ url_for('static', filename='logo.png') }}" height="45" class="mb-3 mx-auto d-block">
        <p class="text-muted small fw-bold mb-4">REGISTRO DE FORNECEDOR</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for message in messages %}<div class="alert alert-danger small fw-bold">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" class="text-start">
            <div class="mb-3"><label class="small fw-bold">RAZÃO SOCIAL</label><input type="text" name="nome" class="form-control" required></div>
            <div class="mb-3">
                <label class="small fw-bold">CNPJ (14 DÍGITOS)</label>
                <input type="text" name="cnpj" class="form-control" maxlength="14" minlength="14" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            </div>
            <div class="mb-3"><label class="small fw-bold">PROPRIEDADE</label><input type="text" name="propriedade" class="form-control" required></div>
            <div class="mb-4"><label class="small fw-bold">LOCALIDADE / CIDADE</label><input type="text" name="localidade" class="form-control" required></div>
            <button type="submit" class="btn btn-lg w-100 text-white fw-bold shadow-sm" style="background-color: #e31e24; border-radius: 0;">SALVAR CADASTRO</button>
            <div class="text-center mt-3"><a href="/cadastro" class="small text-muted fw-bold">← VOLTAR PARA EMBARQUE</a></div>
        </form>
    </div>
</body>
</html>
