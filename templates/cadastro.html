<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magistral - Embarque</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f4f7f6;">
    <div style="background-color: #0f264a; padding: 25px; border-bottom: 6px solid #e31e24;" class="text-center mb-5 shadow">
        <img src="{{ url_for('static', filename='logo.png') }}" height="45">
    </div>
    <div class="container px-3">
        <div class="card p-4 mx-auto shadow-sm border-0" style="max-width: 500px; border-radius: 8px;">
            {% with messages = get_flashed_messages() %}
              {% if messages %}{% for message in messages %}<div class="alert alert-danger small fw-bold">{{ message }}</div>{% endfor %}{% endif %}
            {% endwith %}
            <h5 class="fw-bold text-center mb-4" style="color: #0f264a;">NOTIFICAÇÃO DE EMBARQUE</h5>
            <form method="POST" enctype="multipart/form-data">
                
                <div class="mb-4">
                    <label class="fw-bold small mb-1">PROPRIEDADE</label>
                    <input class="form-control form-control-lg" list="lista_produtores" name="nome_propriedade" id="inputPropriedade" placeholder="Selecione ou digite para buscar..." required style="font-size: 1rem;">
                    <datalist id="lista_produtores">
                        {% for p in produtores %}
                            <option value="{{ p.nome_propriedade }}">{{ p.nome_propriedade }}</option>
                        {% endfor %}
                    </datalist>
                    <div class="text-end mt-2"><a href="/registrar_produtor" class="small text-danger fw-bold">+ CADASTRAR PROPRIEDADE</a></div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-12 col-sm-6 mb-3 mb-sm-0">
                        <label class="fw-bold small mb-1">ESPÉCIE</label>
                        <select name="especie" id="especie" class="form-select form-select-lg" style="font-size: 1rem;">
                            <option value="Bovino">Bovino</option>
                            <option value="Suino">Suíno</option>
                            <option value="Ovino">Ovino</option>
                        </select>
                    </div>
                    <div class="col-12 col-sm-6" id="container-categoria">
                        <label class="fw-bold small mb-1">CATEGORIA</label>
                        <select name="categoria" class="form-select form-select-lg" style="font-size: 1rem;">
                            <option value="Boi">Boi</option>
                            <option value="Vaca">Vaca</option>
                            <option value="Novilha">Novilha</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="fw-bold small mb-1">QUANTIDADE (CABEÇAS)</label>
                    <input type="text" name="quantidade" class="form-control form-control-lg" maxlength="5" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required style="font-size: 1rem;">
                </div>
                
                <div class="mb-4 bg-light p-3 border rounded">
                    <label class="fw-bold small text-muted mb-2">NOTA FISCAL</label>
                    <input type="file" name="nota_fiscal" class="form-control form-control-lg" style="font-size: 0.9rem;">
                </div>
                
                <button type="submit" class="btn btn-lg w-100 text-white fw-bold shadow-sm" style="background-color: #e31e24; border-radius: 4px;">ENVIAR NOTIFICAÇÃO</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('especie').addEventListener('change', function() {
            var containerCat = document.getElementById('container-categoria');
            var selectCat = document.querySelector('select[name="categoria"]');
            
            if (this.value === 'Suino' || this.value === 'Ovino') {
                containerCat.style.display = 'none'; 
                selectCat.disabled = true; 
            } else {
                containerCat.style.display = 'block'; 
                selectCat.disabled = false; 
            }
        });
    </script>
</body>
</html>
